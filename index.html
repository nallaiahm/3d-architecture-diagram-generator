<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Architecture Diagram Generator</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background: linear-gradient(to right, #4b79a1, #283e51);
            color: white;
        }
        .container {
            margin: 20px auto;
            max-width: 450px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0 10px;
            border: none;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.7);
            font-size: 16px;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #ff6600;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background: #ff4500;
        }
        .input-section, .room-section, .type-section, .generate-section, .modify-section {
            display: none;
        }
        .floor-plan {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            margin-top: 20px;
            border: 2px solid white;
            padding: 10px;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
        }
        .room {
            border: 2px solid white;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            position: absolute;
            color: white;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            transition: transform 0.3s, background 0.3s;
        }
        .room:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.2) !important;
        }
    </style>
</head>
<body>
    <h2>🏠 Architecture Diagram Generator</h2>
    <div class="container">
        <div class="input-section" style="display: block;">
            <label>Land Width (meters):</label>
            <input type="number" id="width" required>
            <label>Land Height (meters):</label>
            <input type="number" id="height" required>
            <button onclick="nextStep('room-section')">Next ➡️</button>
        </div>
       
        <div class="room-section">
            <label>Number of Rooms:</label>
            <input type="number" id="numRooms" required>
            <button onclick="generateRoomTypes()">Next ➡️</button>
        </div>
       
        <div class="type-section" id="roomTypes"></div>
       
        <div class="generate-section">
            <button onclick="generateLayout()">🏗️ Generate Architecture</button>
        </div>
       
        <div class="modify-section">
            <p>Need any modifications?</p>
            <button onclick="enableModification()">🔧 Yes</button>
            <button onclick="finalizeLayout()">✅ No</button>
        </div>
       
        <div id="floorPlan" class="floor-plan"></div>
    </div>

    <script>
        function nextStep(section) {
            document.querySelector('.' + section).style.display = 'block';
        }

        function generateRoomTypes() {
            const numRooms = parseInt(document.getElementById("numRooms").value);
            let roomTypesDiv = document.getElementById("roomTypes");
            roomTypesDiv.innerHTML = "";
           
            for (let i = 0; i < numRooms; i++) {
                roomTypesDiv.innerHTML += `<div>
                    <label>Room ${i + 1} Type:</label>
                    <input type="text" class="roomType" required>
                </div>`;
            }
            roomTypesDiv.innerHTML += '<button onclick="nextStep(\'generate-section\')">Next ➡️</button>';
            document.querySelector('.type-section').style.display = 'block';
        }

        function generateLayout() {
            const width = parseInt(document.getElementById("width").value);
            const height = parseInt(document.getElementById("height").value);
            const roomTypes = Array.from(document.getElementsByClassName("roomType")).map(input => input.value);
            const numRooms = roomTypes.length;

            let floorPlan = document.getElementById("floorPlan");
            floorPlan.innerHTML = "";
            floorPlan.style.width = `${width * 20}px`;
            floorPlan.style.height = `${height * 20}px`;
           
            let colors = ["#ff5733", "#33ff57", "#3357ff", "#ff33a6", "#ffdb33", "#9933ff", "#33ffff", "#ff9933"];
            let roomWidth = Math.floor(width / Math.sqrt(numRooms));
            let roomHeight = Math.floor(height / Math.sqrt(numRooms));
           
            let xOffset = 0, yOffset = 0;
            for (let i = 0; i < numRooms; i++) {
                let div = document.createElement("div");
                div.className = "room";
                div.style.width = `${roomWidth * 20}px`;
                div.style.height = `${roomHeight * 20}px`;
                div.style.left = `${xOffset}px`;
                div.style.top = `${yOffset}px`;
                div.style.background = colors[i % colors.length];
                div.innerText = `${roomTypes[i]}\n${roomWidth}m x ${roomHeight}m`;
                div.dataset.width = roomWidth;
                div.dataset.height = roomHeight;
                div.dataset.index = i;
                div.addEventListener("dblclick", () => modifyRoom(div));
                floorPlan.appendChild(div);
               
                xOffset += roomWidth * 20;
                if (xOffset + roomWidth * 20 > width * 20) {
                    xOffset = 0;
                    yOffset += roomHeight * 20;
                }
            }
            document.querySelector('.modify-section').style.display = 'block';
        }

        function modifyRoom(room) {
            let newWidth = parseInt(prompt("Enter new width (meters):"));
            let newHeight = parseInt(prompt("Enter new height (meters):"));
           
            if (isNaN(newWidth) || isNaN(newHeight) || newWidth <= 0 || newHeight <= 0) return;
           
            room.dataset.width = newWidth;
            room.dataset.height = newHeight;
            room.style.width = `${newWidth * 20}px`;
            room.style.height = `${newHeight * 20}px`;
            room.innerText = `${room.innerText.split('\n')[0]}\n${newWidth}m x ${newHeight}m`;
            adjustRooms();
        }

        function adjustRooms() {
            let rooms = document.querySelectorAll(".room");
            let width = parseInt(document.getElementById("width").value) * 20;
            let xOffset = 0, yOffset = 0;
           
            rooms.forEach(room => {
                room.style.left = `${xOffset}px`;
                room.style.top = `${yOffset}px`;
                xOffset += parseInt(room.dataset.width) * 20;
                if (xOffset >= width) {
                    xOffset = 0;
                    yOffset += parseInt(room.dataset.height) * 20;
                }
            });
        }

        function enableModification() {
            alert("Double-click any room to modify its size.");
        }

        function finalizeLayout() {
            alert("Final architecture plan is ready!");
        }
    </script>
</body>
      </html>
